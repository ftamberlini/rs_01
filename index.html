<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration Form</title>
  <link rel="stylesheet" href="./css/style.css" />
  <script src="./js/script.js" defer></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>Registration</h1>
      <p>Please fill in the information below</p>
    </header>

    <form id="registrationForm" novalidate>

      <!-- Step 1: email -->
      <div id="stepEmail">
        <label class="field-label" for="email">Email</label>
        <div class="email-row">
          <input type="email" id="email" name="email" placeholder="your@email.com" required />
          <button type="button" id="btnSearch" class="btn">Search</button>
        </div>
      </div>

      <!-- Step 2: remaining fields (hidden until lookup) -->
      <div id="stepFields" hidden>

        <div class="email-confirmed">
          <span id="emailConfirmed"></span>
          <button type="button" id="btnChangeEmail" class="btn-ghost">Change</button>
        </div>

        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Full name" required />
        </div>

        <div class="field">
          <label>Gender</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="gender" value="male" /> Male
            </label>
            <label class="radio-label">
              <input type="radio" name="gender" value="female" /> Female
            </label>
            <label class="radio-label">
              <input type="radio" name="gender" value="not_informed" checked /> Not Informed
            </label>
          </div>
        </div>
        
        <div class="field-group">
            <div class="field">
              <label for="dob">Date of Birth</label>
              <input type="date" id="dob" name="dob" required />
            </div>

            <div class="field">
              <label for="race">Race</label>
              <select id="race" name="race" required>
                <option value="" disabled selected>Select an option</option>
                <option value="asian">Asian</option>
                <option value="white">White</option>
                <option value="black">Black</option>
                <option value="indigenous">Indigenous</option>
                <option value="mixed_race">Mixed-race</option>
                <option value="not_informed">Not Informed</option>
              </select>
            </div>

            <div class="field">
              <label for="country">Country</label>
              <select id="country" name="country" required>
                <option value="" disabled selected>Select your country</option>
              </select>
            </div>
        </div>
        <button type="submit" id="btnSubmit" class="btn">Save</button>

      </div>

    </form>

    <div id="successMsg" class="success-msg" hidden></div>
  </div>

  <section class="movies-section">
    <h2 class="movies-heading">Featured Movies</h2>
    <div class="movies-grid" id="moviesGrid"></div>
  </section>

  <section class="movie-detail" id="movieDetail">
    <div class="detail-sidebar">
      <img class="detail-poster" id="detailPoster" src="" alt="" />
      <div class="detail-ratings" id="detailRatings"></div>
    </div>
    <div class="detail-body">
      <h2 class="detail-title" id="detailTitle"></h2>
      <div class="detail-meta">
        <div class="detail-col">
          <div class="meta-item"><span class="meta-label">Year</span><span id="detailYear"></span></div>
          <div class="meta-item"><span class="meta-label">Released</span><span id="detailReleased"></span></div>
          <div class="meta-item"><span class="meta-label">Runtime</span><span id="detailRuntime"></span></div>
          <div class="meta-item"><span class="meta-label">Country</span><span id="detailCountry"></span></div>
          <div class="meta-item"><span class="meta-label">Language</span><span id="detailLanguage"></span></div>
        </div>
        <div class="detail-col">
          <div class="meta-item"><span class="meta-label">Genre</span><span id="detailGenre"></span></div>
          <div class="meta-item"><span class="meta-label">Director</span><span id="detailDirector"></span></div>
          <div class="meta-item"><span class="meta-label">Writer</span><span id="detailWriter"></span></div>
          <div class="meta-item"><span class="meta-label">Cast</span><span id="detailCast"></span></div>
          <div class="meta-item"><span class="meta-label">Awards</span><span id="detailAwards"></span></div>
        </div>
      </div>
      <div id="detailPeople" class="detail-people"></div>
      <div id="detailGenresTags" class="detail-genres-tags"></div>
      <div class="detail-plot">
        <span class="meta-label">Sinopse</span>
        <p id="detailPlot"></p>
      </div>
    </div>
  </section>
</body>
</html>
